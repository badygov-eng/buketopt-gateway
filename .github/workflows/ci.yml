name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests && ruff format --check src tests
      - name: Mypy
        run: mypy src
      - name: Bandit
        run: bandit -q -r src
      - name: Vulture
        run: vulture src --min-confidence 100 --exclude src/gateway/__init__.py
      - name: Pytest
        run: pytest -q
