name: Branch cleanup (weekly)
on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - run: |
          set -euo pipefail
          for branch in $(git branch -r --format='%(refname:short)' --sort=-committerdate | grep -E '^origin/(cursor|chore/wip-local|dependabot)' | sed 's|origin/||'); do
            last=$(git log -1 --format=%ct origin/$branch)
            now=$(date +%s)
            age=$(( (now - last) / 86400 ))
            if [ "$age" -gt 14 ]; then
              echo "deleting stale branch: $branch (age=${age}d)"
              git push origin --delete "$branch" || true
            fi
          done
        env:
          GIT_TERMINAL_PROMPT: 0
